<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width-device-width, initial-scale=1.0">
        <title>Lista de Tareas Avanzada</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <div class="container mt-5">
            <h1 class="text-center mb-4">Lista  de Tareas Avanzada</h1>
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="input-group mb-3">
                        <input type="text" id="taskInput" class="form-control" placeholder="Nueva Tarea">
                        <select name="" id="categorySelect" class="form-select" style="max-width: 150px;" required>
                            <option value="">Categoría</option>
                            <option value="trabajo">Trabajo</option>
                            <option value="personal">Personal</option>
                            <option value="estudio">Estudios</option>
                        </select>
                        <input type="text" id="dueDateInput" class="form-control" placeholder="Fecha de vencimiento" style="max-width: 200px;">
                        <button class="btn btn-primary" type="button" id="addTask">Agregar</button>
                    </div>
                    <div class="input-group mb-3">
                        <input type="text" id="searchInput" class="form-control" placeholder="Buscar tareas">
                        <select name="" id="filterSelect" class="form-select" style="max-width: 150px;">
                            <option value="all">Todas</option>
                            <option value="active">Activas</option>
                            <option value="complete">Completa</option>
                        </select>
                        <div class="input-group mb-2">
                            <ul id="taskList" class="list-group mb-3">
                                <!-- Las tareas se agregarán aquí dinámicamente-->
                            </ul>
                        </div>
                    </div>
                    <div id="statistics" class="alert alert-info" role="alert">
                                <!-- Las estadísticas se mostrarán aquí-->
                        </div>
                </div>
            </div>
        </div>
        <script src="js/script.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
        
    </body>
    
</html>
